apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: app
data:
  OTLP_ENDPOINT: http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces
  REDIS_URL: redis://redis.app.svc.cluster.local:6379/0
  DB_URL: postgresql://demo:demo123@pgbouncer.app.svc.cluster.local:6432/ecommerce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app
  labels: {app: frontend}
spec:
  replicas: 1
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: frontend
          image: sre-demo-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080, name: http}]
          envFrom: [{configMapRef: {name: app-config}}]
          env:
            - {name: SERVICE_NAME, value: frontend}
            - {name: DOWNSTREAM_API_GATEWAY, value: http://api-gateway.app.svc.cluster.local:8080}
            - {name: EXPECTED_DEPS, value: api_gateway}
          resources:
            requests: {cpu: 50m, memory: 96Mi}
            limits: {cpu: 200m, memory: 256Mi}
          livenessProbe: {httpGet: {path: /health, port: 8080}, initialDelaySeconds: 10, periodSeconds: 10}
          readinessProbe: {httpGet: {path: /ready, port: 8080}, initialDelaySeconds: 5, periodSeconds: 5}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: app
  labels: {app: api-gateway}
spec:
  replicas: 1
  selector:
    matchLabels: {app: api-gateway}
  template:
    metadata:
      labels: {app: api-gateway}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api-gateway
          image: sre-demo-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080, name: http}]
          envFrom: [{configMapRef: {name: app-config}}]
          env:
            - {name: SERVICE_NAME, value: api-gateway}
            - {name: EXPECTED_DEPS, value: auth,user,order,inventory,payment,notification}
            - {name: DOWNSTREAM_AUTH, value: http://auth-service.app.svc.cluster.local:8080}
            - {name: DOWNSTREAM_USER, value: http://user-service.app.svc.cluster.local:8080}
            - {name: DOWNSTREAM_ORDER, value: http://order-service.app.svc.cluster.local:8080}
            - {name: DOWNSTREAM_INVENTORY, value: http://inventory-service.app.svc.cluster.local:8080}
            - {name: DOWNSTREAM_PAYMENT, value: http://payment-service.app.svc.cluster.local:8080}
            - {name: DOWNSTREAM_NOTIFICATION, value: http://notification-service.app.svc.cluster.local:8080}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 300m, memory: 512Mi}
          livenessProbe: {httpGet: {path: /health, port: 8080}, initialDelaySeconds: 10, periodSeconds: 10}
          readinessProbe: {httpGet: {path: /ready, port: 8080}, initialDelaySeconds: 5, periodSeconds: 5}
---
