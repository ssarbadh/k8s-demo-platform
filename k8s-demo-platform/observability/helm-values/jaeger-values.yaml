provisionDataStore:
  cassandra: false

allInOne:
  enabled: true
  image: jaegertracing/all-in-one:1.59
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnv:
    - name: COLLECTOR_OTLP_ENABLED
      value: "true"

agent:
  enabled: false

collector:
  enabled: false

query:
  enabled: false
