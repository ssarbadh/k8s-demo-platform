apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-demo-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  ecommerce-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "targets": [{"expr": "sum(rate(http_requests_total{service=~\".+\"}[1m])) by (service)", "legendFormat": "{{service}}"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "Error Rate 5xx",
          "type": "timeseries",
          "targets": [{"expr": "sum(rate(http_requests_total{status=~\"5..\"}[1m])) by (service)", "legendFormat": "{{service}}"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "title": "Latency p95",
          "type": "timeseries",
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))", "legendFormat": "{{service}}"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
        },
        {
          "title": "Dependency Errors",
          "type": "timeseries",
          "targets": [{"expr": "sum(rate(dependency_errors_total[1m])) by (service, dependency)", "legendFormat": "{{service}} -> {{dependency}}"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["sre", "demo", "microservices"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "",
      "title": "SRE Demo E-commerce Overview",
      "uid": "sre-demo-overview",
      "version": 1,
      "weekStart": ""
    }
